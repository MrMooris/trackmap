<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMap – Világ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0d0d0d;--surface:#1a1a1a;--surface2:#242424;--border:#333;--accent:#e0e0e0;--muted:#666;}
body{background:var(--bg);color:var(--accent);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
#header h1{font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--accent);}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;}
.back-btn:hover{border-color:#666;color:#ccc;}
#globe-wrap{flex:1;position:relative;overflow:hidden;}
#globe-canvas{width:100%;height:100%;display:block;}
#info-panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,.92);border:1px solid var(--border);border-radius:10px;padding:12px 20px;display:flex;gap:24px;backdrop-filter:blur(8px);}
.info-stat{text-align:center;}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-family:'Space Mono',monospace;}
.info-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
#country-tooltip{position:absolute;background:rgba(26,26,26,.95);border:1px solid #444;border-radius:8px;padding:8px 14px;font-size:13px;pointer-events:none;display:none;z-index:20;white-space:nowrap;}
#legend{position:absolute;top:16px;right:16px;background:rgba(26,26,26,.85);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
#loading p{color:var(--muted);font-size:13px;margin-top:12px;font-family:'Space Mono',monospace;}
.spinner{width:32px;height:32px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="header">
  <h1>⬡ TRACKMAP — VILÁG</h1>
  <a href="index.html" class="back-btn">← Vissza</a>
</div>

<div id="globe-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p>Földgömb betöltése…</p>
  </div>
  <canvas id="globe-canvas"></canvas>
  <div id="country-tooltip"></div>
  <div id="info-panel">
    <div class="info-stat"><div class="info-label">Meglátogatott</div><div class="info-val" id="i-countries">–</div></div>
    <div class="info-stat"><div class="info-label">Összes km</div><div class="info-val" id="i-dist">–</div></div>
    <div class="info-stat"><div class="info-label">Útvonalak</div><div class="info-val" id="i-sess">–</div></div>
  </div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffffff;opacity:.7"></div>Meglátogatott</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a2a3a"></div>Nem járt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e0e0e0;width:16px;border-radius:2px;height:2px"></div>Útvonal</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ── FIREBASE ──────────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2HhTpuw0pex4on-NwGvfODy0vxBVrjBg",
  authDomain: "trackmap-mooris.firebaseapp.com",
  databaseURL: "https://trackmap-mooris-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "trackmap-mooris",
  storageBucket: "trackmap-mooris.firebasestorage.app",
  messagingSenderId: "986771090226",
  appId: "1:986771090226:web:5e314a22d394a69cd2c52b"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const auth = getAuth(fbApp);

// ── THREE.JS GLOBE ────────────────────────────────────────────────────────
const canvas = document.getElementById('globe-canvas');
const wrap = document.getElementById('globe-wrap');
const W = () => wrap.clientWidth;
const H = () => wrap.clientHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W(), H());

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 1000);
camera.position.z = 2.8;

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0x334466, 0.3);
backLight.position.set(-5, -3, -5);
scene.add(backLight);

// Globe group
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Base sphere (ocean)
const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x0a0a14,
  shininess: 30,
  specular: new THREE.Color(0x223355),
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
globeGroup.add(sphere);

// Atmosphere glow
const atmosGeo = new THREE.SphereGeometry(1.02, 64, 64);
const atmosMat = new THREE.MeshPhongMaterial({
  color: 0x1a2a4a,
  transparent: true,
  opacity: 0.08,
  side: THREE.BackSide,
});
globeGroup.add(new THREE.Mesh(atmosGeo, atmosMat));

// Grid lines
function addGridLines() {
  const mat = new THREE.LineBasicMaterial({color:0x1a1a2a, transparent:true, opacity:.4});
  // Lat lines
  for (let lat = -80; lat <= 80; lat += 20) {
    const pts = [];
    for (let lng = 0; lng <= 360; lng += 2) {
      pts.push(latLngToVec3(lat, lng, 1.001));
    }
    globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
  // Lng lines
  for (let lng = 0; lng < 360; lng += 20) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 2) {
      pts.push(latLngToVec3(lat, lng, 1.001));
    }
    globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
}
addGridLines();

// Country borders (simplified from world data)
let visitedCodes = new Set();
let countryMeshes = [];

// Simplified country coordinates (major countries)
const COUNTRIES = {
  'HU': {name:'Magyarország', lat:47.5, lng:19.0},
  'DE': {name:'Németország', lat:51.2, lng:10.4},
  'AT': {name:'Ausztria', lat:47.5, lng:14.5},
  'SK': {name:'Szlovákia', lat:48.7, lng:19.7},
  'RO': {name:'Románia', lat:45.9, lng:24.9},
  'HR': {name:'Horvátország', lat:45.1, lng:15.2},
  'RS': {name:'Szerbia', lat:44.0, lng:21.0},
  'SI': {name:'Szlovénia', lat:46.1, lng:14.9},
  'UA': {name:'Ukrajna', lat:48.4, lng:31.2},
  'PL': {name:'Lengyelország', lat:52.0, lng:19.0},
  'CZ': {name:'Csehország', lat:49.8, lng:15.5},
  'FR': {name:'Franciaország', lat:46.2, lng:2.2},
  'IT': {name:'Olaszország', lat:41.9, lng:12.6},
  'ES': {name:'Spanyolország', lat:40.4, lng:-3.7},
  'GB': {name:'Egyesült Királyság', lat:51.5, lng:-0.1},
  'US': {name:'USA', lat:37.1, lng:-95.7},
  'CN': {name:'Kína', lat:35.9, lng:104.2},
  'JP': {name:'Japán', lat:36.2, lng:138.3},
  'AU': {name:'Ausztrália', lat:-25.3, lng:133.8},
  'BR': {name:'Brazília', lat:-14.2, lng:-51.9},
  'RU': {name:'Oroszország', lat:61.5, lng:105.3},
  'TR': {name:'Törökország', lat:38.9, lng:35.2},
  'GR': {name:'Görögország', lat:39.1, lng:21.8},
  'NL': {name:'Hollandia', lat:52.1, lng:5.3},
  'BE': {name:'Belgium', lat:50.5, lng:4.5},
  'CH': {name:'Svájc', lat:46.8, lng:8.2},
  'PT': {name:'Portugália', lat:39.4, lng:-8.2},
  'SE': {name:'Svédország', lat:60.1, lng:18.6},
  'NO': {name:'Norvégia', lat:60.5, lng:8.5},
  'DK': {name:'Dánia', lat:56.3, lng:9.5},
  'FI': {name:'Finnország', lat:61.9, lng:25.7},
};

function latLngToVec3(lat, lng, r=1) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function addCountryDots() {
  countryMeshes.forEach(m => globeGroup.remove(m));
  countryMeshes = [];
  Object.entries(COUNTRIES).forEach(([code, info]) => {
    const visited = visitedCodes.has(code);
    const geo = new THREE.SphereGeometry(visited ? 0.025 : 0.012, 8, 8);
    const mat = new THREE.MeshPhongMaterial({
      color: visited ? 0xffffff : 0x333344,
      emissive: visited ? 0x888888 : 0x000000,
      shininess: visited ? 80 : 10,
    });
    const mesh = new THREE.Mesh(geo, mat);
    const pos = latLngToVec3(info.lat, info.lng, 1.01);
    mesh.position.copy(pos);
    mesh.userData = {code, ...info, visited};
    globeGroup.add(mesh);
    countryMeshes.push(mesh);

    // Glow ring for visited
    if (visited) {
      const ringGeo = new THREE.RingGeometry(0.03, 0.045, 16);
      const ringMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:.3, side:THREE.DoubleSide});
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(pos);
      ring.lookAt(pos.clone().multiplyScalar(2));
      globeGroup.add(ring);
      countryMeshes.push(ring);
    }
  });
}

// Route lines on globe
function addRouteLines(sessions) {
  sessions.forEach(s => {
    const pts = s.points || [];
    if (pts.length < 2) return;
    // Sample every 5th point for performance
    const sampled = pts.filter((_, i) => i % 5 === 0);
    if (sampled.length < 2) return;
    const linePoints = sampled.map(p => latLngToVec3(p.lat, p.lng, 1.015));
    const geo = new THREE.BufferGeometry().setFromPoints(linePoints);
    const mat = new THREE.LineBasicMaterial({color:0xffffff, transparent:true, opacity:.6});
    globeGroup.add(new THREE.Line(geo, mat));
  });
}

// Stars background
function addStars() {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i < 2000; i++) {
    const r = 20 + Math.random() * 80;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({color:0xffffff, size:0.05, transparent:true, opacity:.6});
  scene.add(new THREE.Points(geo, mat));
}
addStars();

// ── MOUSE INTERACTION ─────────────────────────────────────────────────────
let isDragging = false, prevMouse = {x:0, y:0};
let rotX = 0.3, rotY = 0;
const tooltip = document.getElementById('country-tooltip');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('mousedown', e => {isDragging=true; prevMouse={x:e.clientX,y:e.clientY};});
canvas.addEventListener('mouseup', () => isDragging=false);
canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    rotY += (e.clientX - prevMouse.x) * 0.005;
    rotX += (e.clientY - prevMouse.y) * 0.005;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    prevMouse = {x:e.clientX, y:e.clientY};
    return;
  }
  // Hover tooltip
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(countryMeshes.filter(m=>m.userData.name));
  if (hits.length > 0) {
    const d = hits[0].object.userData;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.innerHTML = `<b>${d.name}</b> ${d.visited ? '✓' : ''}`;
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'grab';
  }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.display='none'; isDragging=false; });

// Touch support
let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  rotY += (t.clientX - lastTouch.clientX) * 0.005;
  rotX += (t.clientY - lastTouch.clientY) * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastTouch = t;
}, {passive:false});

// Zoom
canvas.addEventListener('wheel', e => {
  camera.position.z = Math.max(1.5, Math.min(5, camera.position.z + e.deltaY * 0.003));
});

// ── ANIMATE ───────────────────────────────────────────────────────────────
let autoRotate = true;
canvas.addEventListener('mousedown', () => autoRotate = false);
setTimeout(() => autoRotate = true, 5000);

function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) rotY += 0.002;
  globeGroup.rotation.x = rotX;
  globeGroup.rotation.y = rotY;
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

// ── LOAD DATA ─────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const uid = user.uid;
  try {
    const [sSnap, cSnap] = await Promise.all([
      get(ref(db, `users/${uid}/sessions`)),
      get(ref(db, `users/${uid}/countries`))
    ]);
    const sessions = sSnap.exists() ? Object.values(sSnap.val()) : [];
    const countries = cSnap.exists() ? cSnap.val() : {};
    visitedCodes = new Set(Object.keys(countries));

    // Update info panel
    const total = sessions.reduce((a,s) => a + (s.distKm||0), 0);
    document.getElementById('i-countries').textContent = visitedCodes.size;
    document.getElementById('i-dist').textContent = total.toFixed(0) + ' km';
    document.getElementById('i-sess').textContent = sessions.length;

    addCountryDots();
    addRouteLines(sessions);

    // Focus on first visited country
    if (visitedCodes.size > 0) {
      const first = [...visitedCodes][0];
      const c = COUNTRIES[first];
      if (c) {
        rotY = -(c.lng + 180) * Math.PI / 180;
        rotX = c.lat * Math.PI / 180 * -0.5;
      }
    }
  } catch(e) { console.error(e); }
  document.getElementById('loading').style.display = 'none';
});
</script>
</body>
</html>
