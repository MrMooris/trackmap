<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMap – Világ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050510;--surface:rgba(10,10,30,.9);--border:rgba(100,140,255,.2);--accent:#a0c0ff;--muted:#4466aa;}
body{background:var(--bg);color:var(--accent);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(5,5,20,.95);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
#header h1{font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--accent);}
.hbtns{display:flex;gap:8px;align-items:center;}
#rot-btn{background:#1a2a5a;border:1px solid rgba(160,200,255,.5);color:#a0c0ff;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
#rot-btn:hover{background:#253a7a;border-color:#a0c0ff;}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
#globe-wrap{flex:1;position:relative;overflow:hidden;}
#globe-el{width:100%;height:100%;}
#info-panel{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 28px;display:flex;gap:32px;backdrop-filter:blur(12px);z-index:10;}
.info-stat{text-align:center;}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Space Mono',monospace;}
.info-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
#loading p{color:var(--muted);font-size:13px;margin-top:14px;font-family:'Space Mono',monospace;letter-spacing:1px;}
.spinner{width:36px;height:36px;border:2px solid rgba(100,140,255,.2);border-top-color:#a0c0ff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#legend{position:absolute;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;backdrop-filter:blur(8px);z-index:10;}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:50%;}
</style>
</head>
<body>
<div id="header">
  <h1>⬡ TRACKMAP — VILÁG</h1>
  <div class="hbtns">
    <button id="rot-btn" onclick="toggleRot()">⏸ Auto forgás</button>
    <a href="index.html" class="back-btn">← Vissza</a>
  </div>
</div>
<div id="globe-wrap">
  <div id="loading"><div class="spinner"></div><p>Betöltés…</p></div>
  <div id="globe-el"></div>
  <div id="legend">
    <div class="leg-row"><div class="leg-dot" style="background:#fff"></div>Meglátogatott</div>
    <div class="leg-row"><div class="leg-dot" style="background:transparent;border:1.5px solid rgba(255,255,255,.3)"></div>Nem járt</div>
    <div class="leg-row"><div class="leg-dot" style="background:#88ccff;width:20px;height:2px;border-radius:1px"></div>Útvonal</div>
  </div>
  <div id="info-panel">
    <div class="info-stat"><div class="info-label">Országok</div><div class="info-val" id="i-c">–</div></div>
    <div class="info-stat"><div class="info-label">Összes km</div><div class="info-val" id="i-d">–</div></div>
    <div class="info-stat"><div class="info-label">Útvonalak</div><div class="info-val" id="i-s">–</div></div>
  </div>
</div>

<script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FB = {apiKey:"AIzaSyD2HhTpuw0pex4on-NwGvfODy0vxBVrjBg",authDomain:"trackmap-mooris.firebaseapp.com",databaseURL:"https://trackmap-mooris-default-rtdb.europe-west1.firebasedatabase.app",projectId:"trackmap-mooris",storageBucket:"trackmap-mooris.firebasestorage.app",messagingSenderId:"986771090226",appId:"1:986771090226:web:5e314a22d394a69cd2c52b"};
const db = getDatabase(initializeApp(FB));
const auth = getAuth();

const COUNTRIES = {
  HU:{name:'Magyarország',lat:47.5,lng:19},DE:{name:'Németország',lat:51.2,lng:10.4},
  AT:{name:'Ausztria',lat:47.5,lng:14.5},SK:{name:'Szlovákia',lat:48.7,lng:19.7},
  RO:{name:'Románia',lat:45.9,lng:24.9},HR:{name:'Horvátország',lat:45.1,lng:15.2},
  RS:{name:'Szerbia',lat:44,lng:21},SI:{name:'Szlovénia',lat:46.1,lng:14.9},
  UA:{name:'Ukrajna',lat:48.4,lng:31.2},PL:{name:'Lengyelország',lat:52,lng:19},
  CZ:{name:'Csehország',lat:49.8,lng:15.5},FR:{name:'Franciaország',lat:46.2,lng:2.2},
  IT:{name:'Olaszország',lat:41.9,lng:12.6},ES:{name:'Spanyolország',lat:40.4,lng:-3.7},
  GB:{name:'Egyesült Királyság',lat:51.5,lng:-.1},US:{name:'USA',lat:37.1,lng:-95.7},
  CN:{name:'Kína',lat:35.9,lng:104.2},JP:{name:'Japán',lat:36.2,lng:138.3},
  AU:{name:'Ausztrália',lat:-25.3,lng:133.8},BR:{name:'Brazília',lat:-14.2,lng:-51.9},
  RU:{name:'Oroszország',lat:61.5,lng:90},TR:{name:'Törökország',lat:38.9,lng:35.2},
  GR:{name:'Görögország',lat:39.1,lng:21.8},NL:{name:'Hollandia',lat:52.1,lng:5.3},
  BE:{name:'Belgium',lat:50.5,lng:4.5},CH:{name:'Svájc',lat:46.8,lng:8.2},
  PT:{name:'Portugália',lat:39.4,lng:-8.2},SE:{name:'Svédország',lat:60.1,lng:18.6},
  NO:{name:'Norvégia',lat:60.5,lng:8.5},DK:{name:'Dánia',lat:56.3,lng:9.5},
  FI:{name:'Finnország',lat:61.9,lng:25.7},MX:{name:'Mexikó',lat:23.6,lng:-102.6},
  AR:{name:'Argentína',lat:-38.4,lng:-63.6},ZA:{name:'Dél-Afrika',lat:-30.6,lng:22.9},
  EG:{name:'Egyiptom',lat:26.8,lng:30.8},IN:{name:'India',lat:20.6,lng:78.9},
  TH:{name:'Thaiföld',lat:15.9,lng:100.9},KR:{name:'Dél-Korea',lat:35.9,lng:127.8},
  LV:{name:'Lettország',lat:56.9,lng:24.1},EE:{name:'Észtország',lat:58.6,lng:25.0},LT:{name:'Litvánia',lat:55.2,lng:23.9},UA:{name:'Ukrajna',lat:48.4,lng:31.2},BA:{name:'Bosznia',lat:44.2,lng:17.9},
  BG:{name:'Bulgária',lat:42.7,lng:25.5},ME:{name:'Montenegró',lat:42.7,lng:19.4},
  MK:{name:'Észak-Macedónia',lat:41.6,lng:21.7},AL:{name:'Albánia',lat:41.2,lng:20.2},
};

let globe, rotating = true;

window.toggleRot = function() {
  rotating = !rotating;
  if (globe) globe.controls().autoRotate = rotating;
  const btn = document.getElementById('rot-btn');
  btn.textContent = rotating ? '⏸ Auto forgás' : '▶ Auto forgás';
  btn.style.background = rotating ? '#1a2a5a' : '#0a1a3a';
  btn.style.borderColor = rotating ? 'rgba(160,200,255,.5)' : 'rgba(100,140,255,.3)';
};

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href='index.html'; return; }

  try {
    const [sSnap, cSnap] = await Promise.all([
      get(ref(db, `users/${user.uid}/sessions`)),
      get(ref(db, `users/${user.uid}/countries`))
    ]);
    const sessions = sSnap.exists() ? Object.values(sSnap.val()) : [];
    const countries = cSnap.exists() ? cSnap.val() : {};
    const visited = new Set(Object.keys(countries));
    const total = sessions.reduce((a,s) => a+(s.distKm||0), 0);

    document.getElementById('i-c').textContent = visited.size;
    document.getElementById('i-d').textContent = total.toFixed(0)+' km';
    document.getElementById('i-s').textContent = sessions.length;

    // All country markers — visited = white filled, not visited = empty circle
    const markers = Object.entries(COUNTRIES).map(([code, info]) => {
      const countryData = countries[code] || {};
      const fs = countryData.firstSeen ? new Date(countryData.firstSeen).toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric'}) : null;
      const ls = countryData.lastSeen ? new Date(countryData.lastSeen).toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric'}) : null;
      return {
        lat: info.lat,
        lng: info.lng,
        name: info.name,
        code,
        visited: visited.has(code),
        firstSeen: fs,
        lastSeen: ls,
        size: visited.has(code) ? 0.25 : 0.08,
        color: visited.has(code) ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.15)',
      };
    });

    // Route paths from all sessions
    const paths = sessions
      .filter(s => s.points && s.points.length > 1)
      .map(s => ({
        coords: s.points.filter((_,i) => i % 3 === 0).map(p => [p.lat, p.lng]),
        color: ['rgba(136,200,255,0.9)', 'rgba(80,150,255,0.1)']
      }));

    // Travel arcs between countries
    const arcs = [
      // Magyarországból
      {startLat:47.5, startLng:19.0, endLat:51.2, endLng:10.4, label:'HU → DE'},   // HU → DE
      {startLat:47.5, startLng:19.0, endLat:47.5, endLng:14.5, label:'HU → AT'},   // HU → AT
      {startLat:47.5, startLng:19.0, endLat:44.0, endLng:21.0, label:'HU → RS'},   // HU → RS
      // Bécsből Rigába
      {startLat:47.5, startLng:14.5, endLat:56.9, endLng:24.1, label:'AT → LV'},   // AT → LV
      // Németből Lengyelbe
      {startLat:51.2, startLng:10.4, endLat:52.0, endLng:19.0, label:'DE → PL'},   // DE → PL
    ];

    const wrap = document.getElementById('globe-el');
    globe = Globe()(wrap)
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
      .width(wrap.clientWidth)
      .height(wrap.clientHeight)
      .atmosphereColor('rgba(100,150,255,0.25)')
      .atmosphereAltitude(0.12)
      // Markers — minden ország
      .pointsData(markers)
      .pointLat('lat')
      .pointLng('lng')
      .pointColor('color')
      .pointRadius('size')
      .pointAltitude(0.005)
      .pointLabel(d => '<div style="background:rgba(5,5,20,.95);border:1px solid rgba(100,140,255,.4);border-radius:8px;padding:6px 12px;color:#a0c0ff;font-family:DM Sans;font-size:13px">'
        + (d.visited ? '✓ ' : '') + '<b>' + d.name + '</b></div>')
      // Routes
      .pathsData(paths)
      .pathPoints('coords')
      .pathPointLat(p => p[0])
      .pathPointLng(p => p[1])
      .pathColor('color')
      .pathStroke(1.2)
      .pathDashLength(0.04)
      .pathDashGap(0.02)
      .pathDashAnimateTime(4000)
      // Travel arcs
      .arcsData(arcs)
      .arcStartLat('startLat')
      .arcStartLng('startLng')
      .arcEndLat('endLat')
      .arcEndLng('endLng')
      .arcColor(() => 'rgba(160,210,255,0.55)')
      .arcAltitude(0.03)
      .arcStroke(0.5)
      .arcDashLength(1)
      .arcDashGap(0)
      .arcDashAnimateTime(0)
      .arcLabel('label')
      // Country borders
      .polygonsData([])
      .polygonCapColor(() => 'rgba(0,0,0,0)')
      .polygonStrokeColor(() => 'rgba(150,190,255,0.3)')
      .polygonAltitude(0.001);

    // Load country borders
    fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
      .then(r => r.json())
      .then(data => {
        globe.polygonsData(data.features)
          .polygonCapColor(feat => {
            const name = feat.properties.name;
            const code = Object.entries(COUNTRIES).find(([c,i]) => i.name === name)?.[0];
            return visited.has(code) ? 'rgba(160,200,255,0.06)' : 'rgba(0,0,0,0)';
          })
          .polygonStrokeColor(() => 'rgba(150,190,255,0.25)');
      }).catch(() => {});

    globe.controls().autoRotate = true;

    // Animate planes along arcs using HTML overlay
    const planeContainer = document.createElement('div');
    planeContainer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;';
    document.getElementById('globe-wrap').appendChild(planeContainer);

    arcs.forEach((arc, idx) => {
      const plane = document.createElement('div');
      plane.style.cssText = 'position:absolute;font-size:16px;transition:none;pointer-events:none;transform:translate(-50%,-50%)';
      plane.textContent = '✈️';
      planeContainer.appendChild(plane);

      let progress = (idx / arcs.length); // stagger start
      setInterval(() => {
        progress = (progress + 0.003) % 1;
        const t = progress;
        const lat = arc.startLat + (arc.endLat - arc.startLat) * t;
        const lng = arc.startLng + (arc.endLng - arc.startLng) * t;
        const alt = 0.04 + Math.sin(Math.PI * t) * 0.062;
        const coords = globe.getCoords(lat, lng, alt);
        if (!coords) return;
        // Project 3D to 2D screen
        const vector = new THREE.Vector3(coords.x, coords.y, coords.z);
        const canvas = document.querySelector('#globe-el canvas');
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        // Get camera from globe
        const cam = globe.camera();
        const proj = vector.clone().project(cam);
        const x = (proj.x * 0.5 + 0.5) * rect.width;
        const y = (-proj.y * 0.5 + 0.5) * rect.height;
        // Hide if behind globe
        if (proj.z > 1) { plane.style.display='none'; return; }
        plane.style.display = 'block';
        plane.style.left = x + 'px';
        plane.style.top = y + 'px';
        // Rotate plane based on direction
        const dx = arc.endLng - arc.startLng;
        const dy = arc.endLat - arc.startLat;
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        plane.style.transform = `translate(-50%,-50%) rotate(${-angle}deg)`;
      }, 50);
    });
    globe.controls().autoRotateSpeed = 0.4;
    globe.controls().enableZoom = true;
    globe.pointOfView({lat:47.5, lng:19, altitude:2.2}, 1500);
    window._globe = globe;

    document.getElementById('loading').style.display='none';

    window.addEventListener('resize', () => {
      globe.width(wrap.clientWidth).height(wrap.clientHeight);
    });

  } catch(e) {
    console.error(e);
    document.getElementById('loading').style.display='none';
  }
});
</script>
</body>
</html>
