<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackMap – Világ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#050510;--surface:rgba(10,10,30,.85);--border:rgba(100,140,255,.2);--accent:#a0c0ff;--muted:#4466aa;}
body{background:var(--bg);color:var(--accent);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(5,5,20,.9);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;backdrop-filter:blur(10px);}
#header h1{font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;color:var(--accent);}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
#globe-wrap{flex:1;position:relative;overflow:hidden;}
canvas{width:100%!important;height:100%!important;display:block;}
#info-panel{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 28px;display:flex;gap:32px;backdrop-filter:blur(12px);z-index:10;}
.info-stat{text-align:center;}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Space Mono',monospace;}
.info-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);}
#tooltip{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;pointer-events:none;display:none;z-index:20;white-space:nowrap;backdrop-filter:blur(8px);}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;}
#loading p{color:var(--muted);font-size:13px;margin-top:14px;font-family:'Space Mono',monospace;letter-spacing:1px;}
.spinner{width:36px;height:36px;border:2px solid rgba(100,140,255,.2);border-top-color:#a0c0ff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:11px;color:var(--muted);backdrop-filter:blur(8px);z-index:10;opacity:1;transition:opacity 1s;}
</style>
</head>
<body>
<div id="header">
  <h1>⬡ TRACKMAP — VILÁG</h1>
  <a href="index.html" class="back-btn">← Vissza</a>
</div>
<div id="globe-wrap">
  <div id="loading"><div class="spinner"></div><p>Betöltés…</p></div>
  <canvas id="c"></canvas>
  <div id="tooltip"></div>
  <div id="hint">🖱 Forgatás: húzás · Zoom: görgetés</div>
  <div id="info-panel">
    <div class="info-stat"><div class="info-label">Országok</div><div class="info-val" id="i-c">–</div></div>
    <div class="info-stat"><div class="info-label">Összes km</div><div class="info-val" id="i-d">–</div></div>
    <div class="info-stat"><div class="info-label">Útvonalak</div><div class="info-val" id="i-s">–</div></div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const FB = {
  apiKey:"AIzaSyD2HhTpuw0pex4on-NwGvfODy0vxBVrjBg",
  authDomain:"trackmap-mooris.firebaseapp.com",
  databaseURL:"https://trackmap-mooris-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"trackmap-mooris",
  storageBucket:"trackmap-mooris.firebasestorage.app",
  messagingSenderId:"986771090226",
  appId:"1:986771090226:web:5e314a22d394a69cd2c52b"
};
const db = getDatabase(initializeApp(FB));
const auth = getAuth();

// ── SCENE ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const wrap = document.getElementById('globe-wrap');
const W = () => wrap.clientWidth;
const H = () => wrap.clientHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 1000);
camera.position.z = 2.5;

// Lights
scene.add(new THREE.AmbientLight(0x112244, 2));
const sun = new THREE.DirectionalLight(0xffffff, 2.5);
sun.position.set(5, 3, 4);
scene.add(sun);
const rim = new THREE.DirectionalLight(0x2244aa, 0.8);
rim.position.set(-4, -2, -3);
scene.add(rim);

const globeGroup = new THREE.Group();
scene.add(globeGroup);

// ── EARTH TEXTURE ─────────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
loader.crossOrigin = '';

// Use NASA Blue Marble texture (public domain)
const earthTex = loader.load(
  'https://unpkg.com/three@0.128.0/examples/textures/land_ocean_ice_cloud_2048.jpg',
  () => { document.getElementById('loading').style.display='none'; },
  undefined,
  () => {
    // Fallback: procedural texture
    document.getElementById('loading').style.display='none';
  }
);
const bumpTex = loader.load('https://unpkg.com/three@0.128.0/examples/textures/land_ocean_ice_cloud_2048.jpg');
const specTex = loader.load('https://unpkg.com/three@0.128.0/examples/textures/land_ocean_ice_cloud_2048.jpg');

const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
  map: earthTex,
  bumpMap: bumpTex,
  bumpScale: 0.05,
  specularMap: specTex,
  specular: new THREE.Color(0x334466),
  shininess: 25,
});
globeGroup.add(new THREE.Mesh(earthGeo, earthMat));

// Atmosphere
const atmosGeo = new THREE.SphereGeometry(1.025, 64, 64);
const atmosMat = new THREE.MeshPhongMaterial({
  color: 0x2255aa,
  transparent: true,
  opacity: 0.12,
  side: THREE.FrontSide,
  depthWrite: false,
});
globeGroup.add(new THREE.Mesh(atmosGeo, atmosMat));

// Atmosphere glow (outer)
const glowGeo = new THREE.SphereGeometry(1.06, 64, 64);
const glowMat = new THREE.MeshPhongMaterial({
  color: 0x113388,
  transparent: true,
  opacity: 0.05,
  side: THREE.BackSide,
  depthWrite: false,
});
globeGroup.add(new THREE.Mesh(glowGeo, glowMat));

// ── STARS ─────────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 3000; i++) {
  const r = 30 + Math.random() * 70;
  const t = Math.random() * Math.PI * 2;
  const p = Math.acos(2 * Math.random() - 1);
  starPos.push(r*Math.sin(p)*Math.cos(t), r*Math.sin(p)*Math.sin(t), r*Math.cos(p));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.06,transparent:true,opacity:.7})));

// ── HELPERS ───────────────────────────────────────────────────────────────
function ll2v(lat, lng, r=1) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// ── COUNTRY MARKERS ───────────────────────────────────────────────────────
const COUNTRIES = {
  HU:{name:'Magyarország',lat:47.5,lng:19.0},
  DE:{name:'Németország',lat:51.2,lng:10.4},
  AT:{name:'Ausztria',lat:47.5,lng:14.5},
  SK:{name:'Szlovákia',lat:48.7,lng:19.7},
  RO:{name:'Románia',lat:45.9,lng:24.9},
  HR:{name:'Horvátország',lat:45.1,lng:15.2},
  RS:{name:'Szerbia',lat:44.0,lng:21.0},
  SI:{name:'Szlovénia',lat:46.1,lng:14.9},
  UA:{name:'Ukrajna',lat:48.4,lng:31.2},
  PL:{name:'Lengyelország',lat:52.0,lng:19.0},
  CZ:{name:'Csehország',lat:49.8,lng:15.5},
  FR:{name:'Franciaország',lat:46.2,lng:2.2},
  IT:{name:'Olaszország',lat:41.9,lng:12.6},
  ES:{name:'Spanyolország',lat:40.4,lng:-3.7},
  GB:{name:'Egyesült Királyság',lat:51.5,lng:-0.1},
  US:{name:'USA',lat:37.1,lng:-95.7},
  CN:{name:'Kína',lat:35.9,lng:104.2},
  JP:{name:'Japán',lat:36.2,lng:138.3},
  AU:{name:'Ausztrália',lat:-25.3,lng:133.8},
  BR:{name:'Brazília',lat:-14.2,lng:-51.9},
  RU:{name:'Oroszország',lat:61.5,lng:105.3},
  TR:{name:'Törökország',lat:38.9,lng:35.2},
  GR:{name:'Görögország',lat:39.1,lng:21.8},
  NL:{name:'Hollandia',lat:52.1,lng:5.3},
  BE:{name:'Belgium',lat:50.5,lng:4.5},
  CH:{name:'Svájc',lat:46.8,lng:8.2},
  PT:{name:'Portugália',lat:39.4,lng:-8.2},
  SE:{name:'Svédország',lat:60.1,lng:18.6},
  NO:{name:'Norvégia',lat:60.5,lng:8.5},
  DK:{name:'Dánia',lat:56.3,lng:9.5},
  FI:{name:'Finnország',lat:61.9,lng:25.7},
  MX:{name:'Mexikó',lat:23.6,lng:-102.6},
  AR:{name:'Argentína',lat:-38.4,lng:-63.6},
  ZA:{name:'Dél-Afrika',lat:-30.6,lng:22.9},
  EG:{name:'Egyiptom',lat:26.8,lng:30.8},
  IN:{name:'India',lat:20.6,lng:78.9},
  TH:{name:'Thaiföld',lat:15.9,lng:100.9},
  ID:{name:'Indonézia',lat:-0.8,lng:113.9},
  NG:{name:'Nigéria',lat:9.1,lng:8.7},
  KR:{name:'Dél-Korea',lat:35.9,lng:127.8},
};

let markerMeshes = [];

function addMarkers(visitedSet) {
  markerMeshes.forEach(m => globeGroup.remove(m));
  markerMeshes = [];

  Object.entries(COUNTRIES).forEach(([code, info]) => {
    const visited = visitedSet.has(code);
    const r = visited ? 0.022 : 0.008;
    const col = visited ? 0xa0c8ff : 0x1a2244;
    const emissive = visited ? 0x4488cc : 0x000000;

    const geo = new THREE.SphereGeometry(r, 12, 12);
    const mat = new THREE.MeshPhongMaterial({color:col, emissive:emissive, shininess:visited?100:10});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(ll2v(info.lat, info.lng, 1.012));
    mesh.userData = {code, name:info.name, visited};
    globeGroup.add(mesh);
    markerMeshes.push(mesh);

    if (visited) {
      // Pulse ring
      const ringGeo = new THREE.RingGeometry(0.028, 0.038, 24);
      const ringMat = new THREE.MeshBasicMaterial({color:0x88bbff,transparent:true,opacity:.5,side:THREE.DoubleSide,depthWrite:false});
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(ll2v(info.lat, info.lng, 1.013));
      ring.lookAt(ring.position.clone().multiplyScalar(2));
      ring.userData = {isRing:true};
      globeGroup.add(ring);
      markerMeshes.push(ring);

      // Vertical beam
      const beamGeo = new THREE.CylinderGeometry(0.002, 0.002, 0.08, 4);
      const beamMat = new THREE.MeshBasicMaterial({color:0x88aaff,transparent:true,opacity:.4,depthWrite:false});
      const beam = new THREE.Mesh(beamGeo, beamMat);
      const bPos = ll2v(info.lat, info.lng, 1.05);
      beam.position.copy(bPos);
      beam.lookAt(0,0,0);
      beam.rotateX(Math.PI/2);
      globeGroup.add(beam);
      markerMeshes.push(beam);
    }
  });
}

// Route lines
function addRoutes(sessions) {
  sessions.forEach(s => {
    const pts = (s.points||[]).filter((_,i)=>i%4===0);
    if (pts.length < 2) return;
    const verts = pts.map(p => ll2v(p.lat, p.lng, 1.018));
    const geo = new THREE.BufferGeometry().setFromPoints(verts);
    const mat = new THREE.LineBasicMaterial({color:0x88ccff,transparent:true,opacity:.7,depthWrite:false});
    globeGroup.add(new THREE.Line(geo, mat));
  });
}

// ── INTERACTION ───────────────────────────────────────────────────────────
let rotX=0.4, rotY=1.8, dragging=false, prev={x:0,y:0};
const tooltip = document.getElementById('tooltip');
const ray = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();

canvas.style.cursor='grab';
canvas.addEventListener('mousedown', e=>{dragging=true;prev={x:e.clientX,y:e.clientY};canvas.style.cursor='grabbing';});
window.addEventListener('mouseup', ()=>{dragging=false;canvas.style.cursor='grab';});
canvas.addEventListener('mousemove', e=>{
  if(dragging){
    rotY+=(e.clientX-prev.x)*.005;
    rotX+=(e.clientY-prev.y)*.005;
    rotX=Math.max(-1.4,Math.min(1.4,rotX));
    prev={x:e.clientX,y:e.clientY};
    return;
  }
  const rect=canvas.getBoundingClientRect();
  mouse2.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse2.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse2,camera);
  const hits=ray.intersectObjects(markerMeshes.filter(m=>m.userData.name));
  if(hits.length){
    const d=hits[0].object.userData;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+14)+'px';
    tooltip.style.top=(e.clientY-8)+'px';
    tooltip.innerHTML=`<b>${d.name}</b>${d.visited?' <span style="color:#88ccff">✓ Meglátogatva</span>':''}`;
  } else {
    tooltip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>{tooltip.style.display='none';dragging=false;});
canvas.addEventListener('wheel',e=>{camera.position.z=Math.max(1.4,Math.min(5,camera.position.z+e.deltaY*.003));});

// Touch
let lastT=null;
canvas.addEventListener('touchstart',e=>{lastT=e.touches[0];},{passive:true});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  rotY+=(t.clientX-lastT.clientX)*.005;
  rotX+=(t.clientY-lastT.clientY)*.005;
  rotX=Math.max(-1.4,Math.min(1.4,rotX));
  lastT=t;
},{passive:false});

// Auto rotate
let autoRot=true, autoTimer=null;
canvas.addEventListener('mousedown',()=>{autoRot=false;clearTimeout(autoTimer);autoTimer=setTimeout(()=>autoRot=true,8000);});

// Hint fade
setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity='0';},3000);

// ── ANIMATE ───────────────────────────────────────────────────────────────
let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=0.01;
  if(autoRot) rotY+=0.0015;
  globeGroup.rotation.x=rotX;
  globeGroup.rotation.y=rotY;
  // Pulse rings
  markerMeshes.filter(m=>m.userData.isRing).forEach(r=>{
    r.material.opacity=.3+.2*Math.sin(t*2);
    const s=1+.1*Math.sin(t*2);
    r.scale.set(s,s,s);
  });
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});

// ── FIREBASE ──────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='index.html';return;}
  try {
    const [sSnap,cSnap]=await Promise.all([
      get(ref(db,`users/${user.uid}/sessions`)),
      get(ref(db,`users/${user.uid}/countries`))
    ]);
    const sessions=sSnap.exists()?Object.values(sSnap.val()):[];
    const countries=cSnap.exists()?cSnap.val():{};
    const visited=new Set(Object.keys(countries));
    const total=sessions.reduce((a,s)=>a+(s.distKm||0),0);
    document.getElementById('i-c').textContent=visited.size;
    document.getElementById('i-d').textContent=total.toFixed(0)+' km';
    document.getElementById('i-s').textContent=sessions.length;
    addMarkers(visited);
    addRoutes(sessions);
    // Focus Europe
    rotY=1.8; rotX=0.4;
    document.getElementById('loading').style.display='none';
  } catch(e){
    document.getElementById('loading').style.display='none';
    console.error(e);
  }
});
</script>
</body>
</html>
